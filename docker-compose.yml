services:
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./AiModelStats.Api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - REDIS_CONNECTION=redis:6379
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  svg-renderer:
    build:
      context: ./svg-renderer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3000
      - API_BASE=http://api:8080
    ports:
      - "${SVG_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
